# Hyprlock Configuration - Bright & High Visibility
# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = $HOME/Pictures/wallpapers/aesthetic-green-anime-ls.png
    
    # Improved visibility settings
    brightness = 0.85     # Increased from 0.5 to make the image much lighter
    blur_passes = 2       # Added blur to make UI elements "pop"
    blur_size = 5
    contrast = 1.1        # Slight boost to contrast
    vibrancy = 0.5        # Boosts colors
    vibrancy_darkness = 0.1
}

# Input Field
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2 
    dots_spacing = 0.35 
    dots_center = true
    outer_color = rgb(89bda6)
    inner_color = rgba(255, 255, 255, 0.1) # Light transparent inner box
    font_color = rgb(235, 245, 240)        # Bright light text
    fade_on_empty = true
    rounding = -1
    check_color = rgb(204, 136, 34)
    placeholder_text = <i><span foreground="##ffffff">Input Password...</span></i>
    hide_input = false
    position = 0, -170
    halign = center
    valign = center
}

# Date
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgb(235, 245, 240) # Changed from dark to light
  font_size = 22
  font_family = JetBrains Mono Nerd Font ExtraBold Italic
  position = -35, 60
  halign = center
  valign = bottom
}

# Time
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = rgb(255, 255, 255) # Pure white for maximum visibility
  font_size = 80             # Slightly larger for better impact
  font_family = JetBrains Mono Nerd Font ExtraBold Italic
  position = -20, 200
  halign = center
  valign = center
}

# Uptime days
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$( $Scripts/Uptime.sh)" </b>"
    color = rgb(200, 230, 215) # Light mint
    font_size = 15
    font_family = JetBrains Mono Nerd Font ExtraBold Italic
    position = 0, 30
    halign = center
    valign = bottom
}

# Uptime hours and minutes
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$( $Scripts/Uptimehm.sh)" </b>"
    color = rgb(200, 230, 215)
    font_size = 15
    font_family = JetBrains Mono Nerd Font ExtraBold Italic
    position = 0, 10
    halign = center
    valign = bottom
}

# Weather
label {
    monitor =
    text = cmd[update:3600000] [ -f ~/.cache/.weather_cache ] && cat  ~/.cache/.weather_cache
    color = rgb(200, 230, 215)
    font_size = 10
    font_family = JetBrains Mono Nerd Font ExtraBold Italic
    position = 195, 65
    halign = center
    valign = bottom
}