################
### MONITORS ###
################

# Syntax: monitor=name,res@hz,position,scale

# Primary monitor
monitor=, preferred, auto, auto

# Secondary monitor (HDMI), set above primary
monitor=HDMI-A-1,1920x1080@60,auto-up,auto


xwayland {
  force_zero_scaling = true
}

# Bind workspaces to specific monitors
# When HDMI is unplugged, 6-10 will automatically move to eDP-1
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1

workspace = 8, monitor:HDMI-A-1, default:true
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

###################
### MY PROGRAMS ###
###################
$terminal = konsole
$fileManager = nemo
$menu = wofi --show drun
$browser = firefox
$susp = systemctl suspend

#if using discord canary, currently not used
# there is a wayland forcing script that can be removed if not needed anymore
#$discord = /home/vincent/.local/bin/discord-canary-wayland
$discord = discord


#################
### AUTOSTART ###
#################
# Essential Environment Sync
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# System Services
exec-once = nm-applet &
exec-once = waybar & 
exec-once = awww-daemon &
exec-once = hypridle &
exec-once = mako &

# Start power alert daemon/disabled
#exec-once = poweralertd &

# Start Polkit authentication agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1


# Clipboard Manager
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct

# Fix for Discord/Electron apps lag
env = ELECTRON_OZONE_PLATFORM_HINT,auto

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 6
    border_size = 2
    col.active_border = rgba(81b29aee) rgba(3d5a40ee) 45deg
    col.inactive_border = rgba(0f1210aa)
    layout = dwindle
}

decoration {
    rounding = 7
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 15
        render_power = 4
        color = rgba(00000099)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = global, 1, 10, default
    animation = windows, 1, 4.79, easeOutQuint
    animation = workspaces, 1, 1.94, default, fade
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_options = caps:super
    follow_mouse = 1
    sensitivity = 0.25
    accel_profile = adaptive
    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
#bind = $mainMod, T, exec, $terminal #probably this is more intuitive
bind = $mainMod, Q, killactive, #analog to firefox w kill window shortcut to be more intuitive
bind = $mainMod, M, exec, $susp
bind = $mainMod, E, exec, $fileManager,
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu,
bind = $mainMod, W, fullscreen,

# App launches
bind = $mainMod, D, exec, $discord
bind = $mainMod, F, exec, $browser

# Native Wayland Screenshot grim + slurp
bind = , Print, exec, ~/bin/screenshot select

# Focus movements
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Window movements 

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Window resize (TODO)

bind = $mainMod ALT, right, resizeactive, 50 0
bind = $mainMod ALT, left, resizeactive, -50 0
bind = $mainMod ALT, up, resizeactive, 0 -50
bind = $mainMod ALT, down, resizeactive, 0 50

bind = $mainMod ALT, H, resizeactive, -50 0
bind = $mainMod ALT, L, resizeactive, 50 0
bind = $mainMod ALT, K, resizeactive, 0 -50
bind = $mainMod ALT, J, resizeactive, 0 50

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to Workspace
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Laptop Multimedia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lid Switch (Suspend)
bindl = , switch:on:Lid Switch, exec, systemctl suspend



##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = no-focus-xwayland-floating
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    no_focus = on
}
